<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css" />
    <title>Cinergy</title>
  </head>
  <body>
    <header id="image-menu-container">
      <div class="image-menu"></div>
    </header>

    <main>
      <h1>Cinergy Dance Photo Gallery</h1>

      <section class="item-details-container">
        <div id="details-display" class="item-info">
          <div id="tilt-card">
            <h2 class="item-title">Search Gallery and Add Content</h2>
            <p class="item-description">
              Welcome! This is a photo gallery application that creates a space to share your dance experiences and interact with others uploaded content
            </p>
          </div>
        </div>

        <div class="likes-wrapper hidden">
          <button class="like-button">Like</button>
          <span class="like-count"></span>
        </div>
        <form id="user-form">
          <h3>Search Dance Style</h3>
          <search>
            <input type="search" id="searchInput" placeholder="Type to search category" />
          </search>
          <ul id="categoryList">
            <li class="search-category">Ballet</li>
            <li class="search-category">Contemporary</li>
            <li class="search-category">Modern</li>
          </ul>
          <button type="button" id="searchBtn">Search</button>

          <h3>Add Content</h3>
          <label for="title">Title:</label>
          <input type="text" id="title" name="title" required />

          <label for="caption">Caption:</label>
          <input type="text" id="caption" name="caption" required />

          <label for="category">Category:</label>
          <input type="text" id="category" name="category" required />

          <label for="image">Upload Image:</label>
          <input type="text" name="src" placeholder="Image URL" required />

          <button type="submit">Submit</button>
        </form>
      </section>

      <div id="output"></div>
    </main>
  </body>
</html>
