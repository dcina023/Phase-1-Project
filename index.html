<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css" />
    <title>Image Menu</title>
  </head>
  <body>
    <header id="image-menu-container">
      <div class="image-menu"></div>
    </header>
    <main>
      <section class="item-details-container">
        <div class="item-info">
          <h2 class=""item-title>Title/Caption</h2>
          <p class="item-description">Detailed description</p>
        </div>
      <div class="likes-wrapper">
          <button class="like-button">Like</button>
          <span class="icon">❤️</span><span class="like-count">0</span>
      </div>
      <div class="item-comments-section">
        <h3>Comments</h3>
        <ul class="comments-list">
        </ul>
       <form class="comment-form">
          <input type="text" placeholder="Add a comment..." required>
          <button type="submit">Post</button>
        </form>
      </div>
      </section>
    </main>
  </body>
</html>
