<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css" />
    <title>Cinergy</title>
  </head>
  <body>
    <header id="image-menu-container">
      <div class="image-menu"></div>
    </header>
    <main>
      <section class="item-details-container">
        <div class="item-info" id="tilt-card">
          <h2 class="item-title">Share Your Content</h2>
          <p class="item-description"></p>
        </div>
        <button class ="delete-btn">Delete</button>
        <div class="likes-wrapper hidden">
          <button class="like-button">Like</button>
          <span class="icon">❤️</span>
          <span class="like-count"></span>
        </div>
        <form id="user-form">
          <label for="title">Title:</label>
          <input type="text" id="title" name="title" required>

          <label for="caption">Caption:</label>
          <input type="text" id="caption" name="caption" required>

          <label for="image">Upload Image:</label>
          <input type="text" name="src" placeholder="Image URL" required>

          <button type="submit">Submit</button>
        </form>
        <div id="output"></div>
      </section>
    </main>
  </body>
</html>
